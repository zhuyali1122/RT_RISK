{% if data_source is defined %}
<div class="data-source-status" id="dataSourceStatus">
    <span class="ds-label">{{ t('data_source') }}</span>
    <span class="ds-value ds-{{ data_source }}">{% if data_source == 'cache' %}{{ t('data_cache') }}{% else %}{{ t('data_database') }}{% endif %}</span>
</div>
{% endif %}
