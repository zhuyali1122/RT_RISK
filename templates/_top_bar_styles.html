{# 共享顶部栏样式 - 由 _top_bar.html 引入，无需单独 include #}
<style>
/* 顶部栏基础样式 */
.top-bar {
    background: var(--dark-blue, #3B4A6A);
    color: var(--white, #FFFFFF);
    padding: 0 32px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-shrink: 0;
}
.top-bar .left {
    display: flex;
    align-items: center;
    gap: 24px;
    min-width: 0;
}
.top-bar .logo {
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 2px;
    flex-shrink: 0;
}
.top-bar nav {
    display: flex;
    gap: 4px;
    align-items: center;
}
.top-bar nav a {
    color: rgba(255,255,255,0.7);
    text-decoration: none;
    font-size: 0.82rem;
    padding: 6px 14px;
    border-radius: 6px;
    transition: all 0.2s ease;
    white-space: nowrap;
}
.top-bar nav a:hover {
    color: var(--white, #fff);
    background: rgba(255,255,255,0.1);
}
.top-bar nav a.active {
    color: var(--white, #fff);
    background: rgba(255,241,238,0.15);
    font-weight: 600;
}
.top-bar .lang-switch {
    margin-left: 8px;
    font-size: 0.72rem;
    display: inline-flex;
    align-items: center;
    padding: 4px 10px;
    border-radius: 6px;
    background: rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.95);
}
.top-bar .lang-switch a {
    color: inherit;
    text-decoration: none;
    opacity: 0.75;
    transition: opacity 0.2s;
}
.top-bar .lang-switch a:hover,
.top-bar .lang-switch a.active {
    opacity: 1;
    font-weight: 600;
}
.top-bar .lang-switch .lang-sep {
    margin: 0 6px;
    opacity: 0.6;
}
.top-bar .user-info {
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 0.85rem;
    flex-shrink: 0;
}
.top-bar .user-info > span:not(.role-badge):not(#cache-meta-display) {
    color: rgba(255,255,255,0.95);
}
.role-badge {
    padding: 3px 10px;
    border-radius: 6px;
    font-size: 0.72rem;
    font-weight: 600;
}
.role-admin, .role-project_manager, .role-investor, .role-risk {
    background: rgba(255,241,238,0.2);
    color: var(--light-pink, #FFF1EE);
}
.btn-logout {
    padding: 6px 14px;
    border: 1px solid rgba(255,255,255,0.35);
    border-radius: 6px;
    color: var(--white, #fff);
    background: transparent;
    cursor: pointer;
    font-size: 0.8rem;
    text-decoration: none;
    transition: all 0.2s ease;
}
.btn-logout:hover {
    background: rgba(255,255,255,0.12);
    border-color: rgba(255,255,255,0.5);
}

/* 小屏：两行网格布局 */
@media (max-width: 768px) {
    .top-bar {
        display: grid;
        grid-template-columns: 1fr auto;
        grid-template-rows: auto auto;
        padding: 0 16px;
        min-height: 56px;
        height: auto;
        gap: 0;
    }
    .top-bar .left {
        display: contents; /* logo、nav 成为 top-bar 的直接子项 */
    }
    .top-bar .logo {
        grid-column: 1;
        grid-row: 1;
        align-self: center;
    }
    .top-bar .user-info {
        grid-column: 2;
        grid-row: 1;
        justify-self: end;
        gap: 10px;
        font-size: 0.78rem;
    }
    .top-bar nav {
        grid-column: 1 / -1;
        grid-row: 2;
        flex-wrap: nowrap;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        padding: 8px 0 12px;
        margin: 0 -16px;
        padding-left: 16px;
        padding-right: 16px;
        gap: 4px;
        scrollbar-width: none;
    }
    .top-bar nav::-webkit-scrollbar {
        display: none;
    }
    .top-bar nav a {
        padding: 6px 12px;
        font-size: 0.78rem;
        white-space: nowrap;
        flex-shrink: 0;
    }
    .top-bar .lang-switch {
        margin-left: 4px;
        padding: 4px 8px;
        font-size: 0.68rem;
    }
    #cache-meta-display {
        display: none !important;
    }
    .top-bar .role-badge {
        padding: 2px 8px;
        font-size: 0.65rem;
    }
    .btn-logout {
        padding: 5px 12px;
        font-size: 0.78rem;
    }
    .top-bar .user-name {
        max-width: 100px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }
}

@media (max-width: 480px) {
    .top-bar {
        padding: 0 12px;
    }
    .top-bar .logo {
        font-size: 0.95rem;
    }
}
</style>
